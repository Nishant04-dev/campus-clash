<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Campus Clash</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff004c; --bg: #0a0a0c; --card: #16161a; --text: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin:0; display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-card { background: var(--card); padding: 3rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 2rem; font-weight: 900; }
        input { width: 100%; padding: 1rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8rem; color: white; box-sizing: border-box; font-family: inherit; }
        .btn { width: 100%; padding: 1rem; background: var(--primary); border: none; border-radius: 0.8rem; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,0,76,0.2); }
        .error { color: #ff4444; font-size: 0.8rem; margin-top: 1rem; display: none; }
        .back-link { display: block; margin-top: 1.5rem; color: var(--secondary); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ADMIN ACCESS</h1>
        <form id="admin-login-form">
            <input type="email" id="email" placeholder="Admin Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn">SECURE LOGIN</button>
            <div id="error-msg" class="error"></div>
        </form>
        <a href="../index.html" class="back-link">← Back to Site</a>
    </div>

    <script src="../env.js"></script>
    <script type="module">
        import { authService } from '../src/services/authService.js';
        
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            const { data, error } = await authService.signIn(email, password);
            
            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                const user = await authService.getCurrentUser();
                if (user && ['admin', 'super_admin', 'manager'].includes(user.profile?.role)) {
                    window.location.href = 'index.html';
                } else {
                    if (user) await authService.signOut();
                    errorMsg.textContent = 'Unauthorized: Admin access only';
                    errorMsg.style.display = 'block';
                }
            }
        });
    </script>
</body>
</html>
